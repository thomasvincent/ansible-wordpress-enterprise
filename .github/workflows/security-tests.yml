name: Security Tests

# DISABLED: Security tests require Docker-in-Docker with systemd support,
# privileged containers, and complex infrastructure (MySQL, Redis, etc.)
# that is not available in GitHub Actions standard runners.
#
# To run security tests locally:
#   make test-scenario-04  # Comprehensive security hardening
#   make test-scenario-05  # Security edge cases
#   make test-security-all # All security tests
#
# These tests require:
# - Docker with privileged mode
# - systemd-capable containers
# - Multiple service dependencies
# - SSH connectivity between containers

on:
  workflow_dispatch:  # Manual trigger only

permissions:
  contents: read

env:
  ANSIBLE_FORCE_COLOR: "1"

jobs:
  security-lint:
    name: Security Lint & Static Analysis
    runs-on: [self-hosted]
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint yamllint

      - name: Install required Ansible collections
        run: |
          ansible-galaxy collection install community.crypto
          ansible-galaxy collection install ansible.posix
          ansible-galaxy collection install community.mysql
          ansible-galaxy collection install community.general

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint

      - name: Verify security hardening tasks parse correctly
        run: |
          ansible-playbook --syntax-check tests/test.yml

  molecule-test:
    name: Molecule Security Verification
    runs-on: [self-hosted]
    needs: security-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-molecule-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-molecule-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core molecule molecule-plugins[docker] pytest-testinfra

      - name: Install required Ansible collections
        run: |
          ansible-galaxy collection install community.crypto
          ansible-galaxy collection install ansible.posix
          ansible-galaxy collection install community.mysql
          ansible-galaxy collection install community.general

      - name: Run Molecule tests
        run: molecule test -s default
        timeout-minutes: 30
